<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title">
  <title id="logo-title">Żyleta Karaoke</title>
  <defs>
    <filter id="neon-glow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feFlood flood-color="var(--neon-primary, #ff00ff)" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur1" operator="in" result="glow1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur2"/>
      <feFlood flood-color="var(--neon-secondary, #00ffff)" flood-opacity="0.3" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="glow2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="var(--neon-secondary, #00ffff)" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main title -->
  <text
    x="200" y="55"
    text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-weight="700"
    font-size="48"
    letter-spacing="2"
    fill="var(--neon-primary, #ff00ff)"
    filter="url(#neon-glow-strong)"
  >
    ŻYLETA
  </text>

  <!-- Subtitle -->
  <text
    x="200" y="95"
    text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-weight="500"
    font-size="28"
    letter-spacing="8"
    fill="var(--neon-secondary, #00ffff)"
    filter="url(#neon-glow-subtle)"
  >
    KARAOKE
  </text>

  <!-- Decorative lines -->
  <line x1="40" y1="68" x2="130" y2="68" stroke="var(--neon-tertiary, #b700ff)" stroke-width="1" opacity="0.6"/>
  <line x1="270" y1="68" x2="360" y2="68" stroke="var(--neon-tertiary, #b700ff)" stroke-width="1" opacity="0.6"/>
</svg>
