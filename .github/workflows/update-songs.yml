name: Process Song List

on:
  push:
    branches: [master]
    paths:
      - 'data/raw-filelist.json'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-fetch all songs from APIs (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'update-songs'
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate raw file list
        run: |
          FILE="data/raw-filelist.json"
          if [ ! -f "$FILE" ]; then
            echo "::error::raw-filelist.json not found"
            exit 1
          fi

          FILE_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('$FILE','utf8')); console.log(d.files?.length ?? 0)")

          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "::error::Suspiciously small file list ($FILE_COUNT files). Minimum 10 required."
            exit 1
          fi

          echo "Validated: $FILE_COUNT files in raw list"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore API cache
        if: inputs.force_refresh != 'true'
        uses: actions/cache@v4
        with:
          path: |
            scripts/cache.json
            scripts/artist-cache.json
            scripts/discogs-cache.json
            scripts/lastfm-cache.json
          key: api-cache-${{ hashFiles('data/raw-filelist.json') }}
          restore-keys: |
            api-cache-

      - name: Clear cache (force refresh)
        if: inputs.force_refresh == 'true'
        run: |
          rm -f scripts/cache.json scripts/artist-cache.json scripts/discogs-cache.json scripts/lastfm-cache.json
          echo "Cache cleared for force refresh"

      - name: Validate API tokens
        run: |
          echo "## API Token Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Provider | Token | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # MusicBrainz - no token needed
          echo "| MusicBrainz | not required | ✅ Always active |" >> $GITHUB_STEP_SUMMARY

          # Discogs
          if [ -n "$DISCOGS_TOKEN" ]; then
            # Quick validation: test request to Discogs API
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Discogs token=${DISCOGS_TOKEN}" \
              -H "User-Agent: ZyletaKaraoke/1.0" \
              "https://api.discogs.com/database/search?q=test&per_page=1" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "| Discogs | configured | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Discogs | configured | ⚠️ HTTP $HTTP_CODE — token may be expired |" >> $GITHUB_STEP_SUMMARY
              echo "::warning::Discogs token returned HTTP $HTTP_CODE. Pipeline will continue without Discogs."
            fi
          else
            echo "| Discogs | not configured | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # Last.fm
          if [ -n "$LASTFM_API_KEY" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://ws.audioscrobbler.com/2.0/?method=track.search&track=test&api_key=${LASTFM_API_KEY}&format=json&limit=1" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "| Last.fm | configured | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Last.fm | configured | ⚠️ HTTP $HTTP_CODE — API key may be invalid |" >> $GITHUB_STEP_SUMMARY
              echo "::warning::Last.fm API key returned HTTP $HTTP_CODE. Pipeline will continue without Last.fm."
            fi
          else
            echo "| Last.fm | not configured | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # Claude AI
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "| Claude AI | configured | ✅ Available for verification |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Claude AI | not configured | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # Gemini AI
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "| Gemini AI | configured | ✅ Available for verification |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Gemini AI | not configured | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Backup current songs.json
        run: |
          if [ -f src/data/songs.json ]; then
            cp src/data/songs.json src/data/songs.backup.json
            SONG_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/songs.json','utf8')).length)")
            echo "Backed up songs.json ($SONG_COUNT songs)"
          fi

      - name: Process raw file list into songs.json
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force_refresh }}" = "true" ]; then
            FORCE_FLAG="--force"
            echo "Running with --force (cache ignored)"
          fi
          npx tsx scripts/process-filelist.ts $FORCE_FLAG
        env:
          MUSICBRAINZ_ENABLED: 'true'
          REPORTS_DIR: /tmp/pipeline-reports
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Safety check - prevent catastrophic song loss
        run: |
          if [ ! -f src/data/songs.json ]; then
            echo "::error::songs.json was not generated!"
            exit 1
          fi

          NEW_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/songs.json','utf8')).length)")

          if [ -f src/data/songs.backup.json ]; then
            OLD_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/songs.backup.json','utf8')).length)")

            if [ "$OLD_COUNT" -gt 50 ] && [ "$NEW_COUNT" -lt $((OLD_COUNT / 2)) ]; then
              echo "::error::New list ($NEW_COUNT songs) is less than half of previous ($OLD_COUNT songs). Aborting."
              exit 1
            fi
          fi

          echo "Safety check passed: $NEW_COUNT songs"

      - name: Upload pipeline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-reports
          path: /tmp/pipeline-reports/
          retention-days: 90
          if-no-files-found: ignore

      - name: Check for changes
        id: changes
        run: |
          rm -f src/data/songs.backup.json
          if git diff --quiet src/data/songs.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated songs.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/songs.json
          git commit -m "chore: auto-update songs.json from raw file list"
          git pull --rebase origin master
          git push

      - name: Find pipeline report
        if: always()
        id: report_info
        run: |
          LATEST_REPORT=$(ls -t /tmp/pipeline-reports/*.md 2>/dev/null | head -1)
          if [ -n "$LATEST_REPORT" ]; then
            echo "report_path=$LATEST_REPORT" >> $GITHUB_OUTPUT
            echo "report_exists=true" >> $GITHUB_OUTPUT
            echo "Found report: $LATEST_REPORT"
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
            echo "No pipeline report found"
          fi

      - name: Push report to private repository
        if: steps.report_info.outputs.report_exists == 'true'
        env:
          REPORT_REPO_TOKEN: ${{ secrets.REPORT_REPO_TOKEN }}
        run: |
          # Setup:
          # 1. Create a private repo: github.com/kruzyk/zyleta-karaoke-reports
          # 2. Generate a Fine-grained Personal Access Token (PAT):
          #    GitHub → Settings → Developer settings → Fine-grained tokens → Generate
          #    - Repository access: "Only select repositories" → zyleta-karaoke-reports
          #    - Permissions: Contents → Read and write
          # 3. Add the token as a secret in zyleta-karaoke repo:
          #    Settings → Secrets → Actions → New secret → REPORT_REPO_TOKEN

          if [ -z "$REPORT_REPO_TOKEN" ]; then
            echo "::warning::REPORT_REPO_TOKEN not configured. Skipping private repo push."
            echo "See workflow comments for setup instructions."
            exit 0
          fi

          REPORT_FILE="${{ steps.report_info.outputs.report_path }}"
          REPORT_BASENAME=$(basename "$REPORT_FILE")

          # Clone the private reports repository
          git clone "https://x-access-token:${REPORT_REPO_TOKEN}@github.com/kruzyk/zyleta-karaoke-reports.git" /tmp/report-repo

          cd /tmp/report-repo

          # Organize reports by year/month
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          mkdir -p "reports/${YEAR}/${MONTH}"
          cp "$REPORT_FILE" "reports/${YEAR}/${MONTH}/${REPORT_BASENAME}"

          # Update latest symlink / copy
          cp "$REPORT_FILE" "reports/latest.md"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "report: pipeline run #${{ github.run_number }} ($(date +%Y-%m-%d))"
          git push
          echo "Report pushed to private repository"
        continue-on-error: true

  deploy:
    needs: process
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CONFIGCAT_SDK_KEY: ${{ secrets.CONFIGCAT_SDK_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
