name: Process Song List

on:
  push:
    branches: [master]
    paths:
      - 'data/raw-filelist.json'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-fetch all songs from MusicBrainz (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'update-songs'
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate raw file list
        run: |
          FILE="data/raw-filelist.json"
          if [ ! -f "$FILE" ]; then
            echo "::error::raw-filelist.json not found"
            exit 1
          fi

          FILE_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('$FILE','utf8')); console.log(d.files?.length ?? 0)")

          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "::error::Suspiciously small file list ($FILE_COUNT files). Minimum 10 required."
            exit 1
          fi

          echo "Validated: $FILE_COUNT files in raw list"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore MusicBrainz cache
        if: inputs.force_refresh != 'true'
        uses: actions/cache@v4
        with:
          path: |
            scripts/cache.json
            scripts/artist-cache.json
          key: musicbrainz-cache-${{ hashFiles('data/raw-filelist.json') }}
          restore-keys: |
            musicbrainz-cache-

      - name: Clear cache (force refresh)
        if: inputs.force_refresh == 'true'
        run: |
          rm -f scripts/cache.json scripts/artist-cache.json
          echo "Cache cleared for force refresh"

      - name: Backup current songs.json
        run: |
          if [ -f src/data/songs.json ]; then
            cp src/data/songs.json src/data/songs.backup.json
            SONG_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/songs.json','utf8')).length)")
            echo "Backed up songs.json ($SONG_COUNT songs)"
          fi

      - name: Process raw file list into songs.json
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force_refresh }}" = "true" ]; then
            FORCE_FLAG="--force"
            echo "Running with --force (cache ignored)"
          fi
          npx tsx scripts/process-filelist.ts $FORCE_FLAG
        env:
          MUSICBRAINZ_ENABLED: 'true'

      - name: Safety check - prevent catastrophic song loss
        run: |
          if [ ! -f src/data/songs.json ]; then
            echo "::error::songs.json was not generated!"
            exit 1
          fi

          NEW_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/songs.json','utf8')).length)")

          if [ -f src/data/songs.backup.json ]; then
            OLD_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/songs.backup.json','utf8')).length)")

            if [ "$OLD_COUNT" -gt 50 ] && [ "$NEW_COUNT" -lt $((OLD_COUNT / 2)) ]; then
              echo "::error::New list ($NEW_COUNT songs) is less than half of previous ($OLD_COUNT songs). Aborting."
              exit 1
            fi
          fi

          echo "Safety check passed: $NEW_COUNT songs"

      - name: Check for changes
        id: changes
        run: |
          rm -f src/data/songs.backup.json
          if git diff --quiet src/data/songs.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated songs.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/songs.json
          git commit -m "chore: auto-update songs.json from raw file list"
          git push

  deploy:
    needs: process
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CONFIGCAT_SDK_KEY: ${{ secrets.CONFIGCAT_SDK_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
